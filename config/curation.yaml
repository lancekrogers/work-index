# curation.yaml — single source of truth for editorial decisions.
#
# Three sections:
#   excluded:  repos that should never appear in the catalog
#   todo:      repos that need a decision
#   catalog:   repos to display, with category + optional prose
#
# Catalog entries:
#   org/name:
#     category: <slug>              # required
#     summary: "..."                # optional — falls back to GitHub description
#     why_it_matters: "..."         # optional — for flagships
#     status: active|maintained|... # optional
#
# Commands:
#   workindex add <org/name> <category> [summary]
#   workindex exclude <org/name>
#   workindex sync        (pull GitHub + render)
#   workindex generate    (render only)

