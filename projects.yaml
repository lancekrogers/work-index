# work-index: Project Catalog
# This is the single source of truth for every project in the catalog.
# All category pages, the README, and any generated output derive from this file.
#
# Schema:
#   name:            Required. Display name
#   slug:            Required. URL-safe identifier, used for filenames
#   category:        Required. One of: ai-agents, backend-infra, blockchain-fintech, devtools-workflows, experiments
#   status:          Required. One of: active, maintained, complete, archived, experiment
#   stack:           Required. Primary technologies
#   repo:            Required. Full GitHub URL
#   visibility:      Required. One of: public, private, org-only
#   org:             Required. GitHub org or username
#   summary:         Required. One-sentence description
#   why_it_matters:  Optional. Why this project is significant
#   tags:            Optional. Cross-cutting tags
#   highlights:      Optional. Key achievements or features
#   date_started:    Optional. YYYY-MM or YYYY-MM-DD
#   has_deep_dive:   Optional. Whether projects/<slug>.md exists

